# ─────────────────────────────────────────────────────────────────────────────
# Production docker-compose.yml
#
# Hassas değerleri (POSTGRES_PASSWORD vb.) bu dosyada saklamayın.
# Projenin kök dizininde bir .env dosyası oluşturun (.env.example'ı kopyalayın).
# Geliştirme ortamı için docker-compose.override.yml otomatik uygulanır.
# ─────────────────────────────────────────────────────────────────────────────
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      # Healthcheck tamamlanmadan API başlamaz — race condition önlenir
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  db:
    image: postgres:16-alpine
    # Sadece localhost'a bağla; production'da bu port satırını kaldırın
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eczanem}
      POSTGRES_USER: ${POSTGRES_USER:-eczanem_user}
      # Kök .env dosyasından gelir; eksikse başlatma başarısız olur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eczanem_pass_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eczanem_user} -d ${POSTGRES_DB:-eczanem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    # Sadece localhost'a bağla; production'da bu port satırını kaldırın
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # Her 60s içinde en az 1 değişiklik varsa diske yazar (AOF yerine hafif RDB)
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend

networks:
  # Özel köprü ağı: servisler birbirini isimle çözümler, dış ağdan izole
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

