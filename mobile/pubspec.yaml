name: eczanem
description: "Eczanem - Kişisel İlaç Asistanınız"
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2
  http_parser: ^4.1.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_riverpod: ^2.6.1

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  image: ^4.5.4

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media
  camera: ^0.11.2+1
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  share_plus: ^10.1.3

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Calendar
  table_calendar: ^3.1.3

  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env
